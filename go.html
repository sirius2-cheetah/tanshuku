<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>
    <script>
        // URLパラメータからIDを取得
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');
        const GAS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbxI7z0qCNyP_FmpZCdGl11TSF_Ln9uq1Tb48BgjTZhaA-AEHENj0DElJNi1ml2YxNZG/exec"; // ここもGASのデプロイURLに書き換え

        if (id) {
            // GASへリダイレクト。GAS側で最終的なURLへ飛ばす
            window.location.href = `${GAS_WEBAPP_URL}?id=${id}`;
        } else {
            document.write("Invalid Link");
        }
    </script>
</head>
<body>
    <p>リダイレクトしています...</p>
</body>
</html>
