<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sirius Shortener</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --bg-color: #f5f7fa;
            --card-bg: #ffffff;
            --text-color: #333;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h1 { font-size: 1.5rem; margin-bottom: 1.5rem; color: var(--primary-color); }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 1rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        #result {
            margin-top: 1.5rem;
            padding: 1rem;
            background: #eef2f7;
            border-radius: 6px;
            display: none;
            word-break: break-all;
        }
        .copy-btn {
            margin-top: 0.5rem;
            background: #555;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>URL Shortener</h1>
        <input type="url" id="urlInput" placeholder="https://example.com" required>
        <button onclick="shortenURL()">短縮URLを生成</button>
        
        <div id="result">
            <p style="margin:0; font-size:0.9rem; color:#666;">生成されたURL:</p>
            <strong id="shortUrl"></strong>
            <button class="copy-btn" onclick="copyURL()">コピーする</button>
        </div>
    </div>

    <script>
        const GAS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbxI7z0qCNyP_FmpZCdGl11TSF_Ln9uq1Tb48BgjTZhaA-AEHENj0DElJNi1ml2YxNZG/exec"; // GASのデプロイURLをここに
        const CUSTOM_DOMAIN = window.location.origin; // このサイトのドメイン

        async function shortenURL() {
            const urlInput = document.getElementById('urlInput').value;
            if(!urlInput) return alert("URLを入力してください");

            const res = await fetch(GAS_WEBAPP_URL, {
                method: "POST",
                body: JSON.stringify({ url: urlInput })
            });
            const data = await res.json();

            if(data.success) {
                const resultDiv = document.getElementById('result');
                const shortUrl = `${CUSTOM_DOMAIN}/go.html?id=${data.id}`;
                document.getElementById('shortUrl').innerText = shortUrl;
                resultDiv.style.display = 'block';
            }
        }

        function copyURL() {
            const url = document.getElementById('shortUrl').innerText;
            navigator.clipboard.writeText(url);
            alert("コピーしました！");
        }
    </script>
</body>
</html>
