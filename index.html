<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sirius Shortener</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --bg-color: #f5f7fa;
            --card-bg: #ffffff;
            --text-color: #333;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* 高さ可変に対応 */
            margin: 0;
        }
        .container {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h1 { font-size: 1.5rem; margin-bottom: 1.5rem; color: var(--primary-color); }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 1rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        #result {
            margin-top: 1.5rem;
            padding: 1rem;
            background: #eef2f7;
            border-radius: 6px;
            display: none;
            word-break: break-all;
        }
        /* QRコード表示エリアのスタイル */
        #qrcode-container {
            margin-top: 1rem;
            background: #fff;
            padding: 10px;
            display: inline-block;
            border-radius: 8px;
            border: 1px solid #ddd;
        }
        #qrcode-img {
            display: block;
            width: 150px;
            height: 150px;
        }
        .copy-btn {
            margin-top: 1rem;
            background: #555;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>URL Shortener</h1>
        <input type="url" id="urlInput" placeholder="https://example.com" required>
        <button id="generateBtn" onclick="shortenURL()">短縮URLを生成</button>
        
        <div id="result">
            <p style="margin:0; font-size:0.9rem; color:#666;">生成されたURL:</p>
            <strong id="shortUrl"></strong>
            
            <div id="qrcode-container">
                <img id="qrcode-img" src="" alt="QRコード">
            </div>
            
            <button class="copy-btn" onclick="copyURL()">コピーする</button>
        </div>
    </div>

    <script>
        const GAS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbxI7z0qCNyP_FmpZCdGl11TSF_Ln9uq1Tb48BgjTZhaA-AEHENj0DElJNi1ml2YxNZG/exec";
        const CUSTOM_DOMAIN = window.location.origin;

        async function shortenURL() {
            const urlInput = document.getElementById('urlInput').value;
            const btn = document.getElementById('generateBtn');
            if(!urlInput) return alert("URLを入力してください");

            btn.disabled = true;
            btn.innerText = "生成中...";

            try {
                const res = await fetch(GAS_WEBAPP_URL, {
                    method: "POST",
                    body: JSON.stringify({ url: urlInput })
                });
                const data = await res.json();

                if(data.success) {
                    const resultDiv = document.getElementById('result');
                    const shortUrl = `${CUSTOM_DOMAIN}/go.html?id=${data.id}`;
                    
                    // URL表示
                    document.getElementById('shortUrl').innerText = shortUrl;
                    
                    // QRコード生成 (Google Charts API)
                    // 150x150サイズ、URLをエンコードしてセット
                    const qrUrl = `https://chart.googleapis.com/chart?chs=150x150&cht=qr&chl=${encodeURIComponent(shortUrl)}`;
                    document.getElementById('qrcode-img').src = qrUrl;

                    resultDiv.style.display = 'block';
                }
            } catch (e) {
                alert("エラーが発生しました。");
            } finally {
                btn.disabled = false;
                btn.innerText = "短縮URLを生成";
            }
        }

        function copyURL() {
            const url = document.getElementById('shortUrl').innerText;
            // SSL対応済みなのでnavigator.clipboardが確実に使えます
            navigator.clipboard.writeText(url).then(() => {
                alert("コピーしました！");
            });
        }
    </script>
</body>
</html>
