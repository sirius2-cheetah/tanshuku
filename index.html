<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sirius Shortener</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --bg-color: #f5f7fa;
            --card-bg: #ffffff;
            --text-color: #333;
            --accent-bg: #eef2f7;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
        }
        .container {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h1 { font-size: 1.5rem; margin-bottom: 1.5rem; color: var(--primary-color); margin-top: 0; }
        
        /* 💡 ペイウォールとアプリ本体の切り替え用 */
        #app-content { display: none; }
        #paywall-content { display: block; }
        
        /* ペイウォールの装飾 */
        .paywall-info-box {
            background-color: var(--accent-bg);
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            margin: 1.5rem 0;
            text-align: left;
            font-size: 0.9rem;
            line-height: 1.6;
        }
        .pay-btn {
            width: 100%;
            padding: 15px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: bold;
            transition: opacity 0.2s;
        }
        .pay-btn:hover { opacity: 0.9; }

        /* ツール本体の装飾 */
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 1rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        button.action-btn {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            transition: opacity 0.2s;
        }
        button.action-btn:hover { opacity: 0.9; }
        
        #result {
            margin-top: 1.5rem;
            padding: 1.5rem 1rem;
            background: var(--accent-bg);
            border-radius: 8px;
            display: none;
            border: 1px solid #ddd;
        }
        #result p { margin: 0 0 0.5rem 0; font-size: 0.9rem; color: #666; }
        
        #shortUrl {
            display: block;
            margin-bottom: 1rem;
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--primary-color);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        #qrcode-container {
            margin: 1rem 0;
            background: #fff;
            padding: 12px;
            display: inline-block;
            border-radius: 8px;
            border: 1px solid #ccc;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        #qrcode-img {
            display: block;
            width: 150px;
            height: 150px;
        }
        
        .action-btns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 1rem;
        }
        .copy-btn {
            background: #555;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 0.9rem;
            padding: 10px;
            cursor: pointer;
        }
        .copy-btn:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <div class="container">
        
        <div id="paywall-content">
            <h1>Sirius Shortener<br><span style="font-size: 1rem; color: #666;">PRO Access</span></h1>
            <p style="color: #555; font-size: 0.95rem;">高機能URL短縮ツールの利用には、アクセス権の購入が必要です。</p>
            
            <div class="paywall-info-box">
                <strong>【ツール仕様】</strong><br>
                ・販売者: SIRIUSII<br>
                ・価格: 50 コイン (Chat Time Pay)<br>
                ・無期限アクセス (ブラウザに記憶されます)
            </div>
            
            <button class="pay-btn" onclick="openPayment()">50 Coin でアクセス権を購入</button>
        </div>

        <div id="app-content">
            <h1>URL Shortener</h1>
            <input type="url" id="urlInput" placeholder="https://example.com" required>
            <button class="action-btn" id="generateBtn" onclick="shortenURL()">短縮URLを生成</button>
            
            <div id="result">
                <p>生成されたURL:</p>
                <strong id="shortUrl"></strong>
                
                <div id="qrcode-container">
                    <img id="qrcode-img" src="" alt="QRコード">
                </div>
                
                <div class="action-btns">
                    <button class="copy-btn" onclick="copyURL()">URLをコピー</button>
                    <button class="copy-btn" style="background:#666;" onclick="downloadQR()">QRを保存</button>
                </div>
            </div>
        </div>

    </div>

    <script>
        // ======= 決済・アクセス制御ロジック (リダイレクト方式) =======
        const UNLOCK_KEY = 'sirius_shortener_unlocked';
        const DEPLOY_ID = 'AKfycbx5bammAxf5RJBGpzox1c6N5tkcx0eW5OuARHUNDO0n1EKIQWuu5O0yIrdoM-pUYkVY_Q'; // Chat Time PayのID

        window.addEventListener('DOMContentLoaded', () => {
            // URLから決済完了のシグナルを受け取る
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('pay_status') === 'success') {
                localStorage.setItem(UNLOCK_KEY, 'true');
                
                // URLを綺麗にする
                const cleanUrl = window.location.protocol + "//" + window.location.host + window.location.pathname;
                window.history.replaceState({path: cleanUrl}, '', cleanUrl);
                
                alert("決済が完了しました！\nSirius Shortenerが解放されました。");
            }

            // ストレージを確認して画面を出し分ける
            if (localStorage.getItem(UNLOCK_KEY) === 'true') {
                document.getElementById('paywall-content').style.display = 'none';
                document.getElementById('app-content').style.display = 'block';
            }
        });

        // 決済画面へジャンプする処理
        function openPayment() {
            const currentUrl = window.location.href.split('?')[0];
            const encodedReturnUrl = encodeURIComponent(currentUrl);
            const PAY_URL = `https://script.google.com/macros/s/${DEPLOY_ID}/exec?page=payment&shop=SIRIUSII&item=Shortener%20PRO&amount=50&redirect_url=${encodedReturnUrl}`;
            
            window.location.href = PAY_URL;
        }

        // ======= URL短縮ツールのメインロジック =======
        const GAS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbxI7z0qCNyP_FmpZCdGl11TSF_Ln9uq1Tb48BgjTZhaA-AEHENj0DElJNi1ml2YxNZG/exec";
        const CUSTOM_DOMAIN = window.location.origin;

        async function shortenURL() {
            const urlInput = document.getElementById('urlInput').value;
            const btn = document.getElementById('generateBtn');
            if(!urlInput) return alert("URLを入力してください");

            btn.disabled = true;
            btn.innerText = "生成中...";

            try {
                const res = await fetch(GAS_WEBAPP_URL, {
                    method: "POST",
                    body: JSON.stringify({ url: urlInput })
                });
                const data = await res.json();

                if(data.success) {
                    const resultDiv = document.getElementById('result');
                    const shortUrl = `${CUSTOM_DOMAIN}/go.html?id=${data.id}`;
                    
                    const shortUrlEl = document.getElementById('shortUrl');
                    shortUrlEl.innerText = shortUrl;
                    shortUrlEl.title = shortUrl;
                    
                    const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(shortUrl)}`;
                    document.getElementById('qrcode-img').src = qrUrl;

                    resultDiv.style.display = 'block';
                }
            } catch (e) {
                alert("エラーが発生しました。");
            } finally {
                btn.disabled = false;
                btn.innerText = "短縮URLを生成";
            }
        }

        function copyURL() {
            const url = document.getElementById('shortUrl').innerText;
            navigator.clipboard.writeText(url).then(() => {
                alert("コピーしました！");
            });
        }

        function downloadQR() {
            const img = document.getElementById('qrcode-img');
            if(!img.src) return;
            const link = document.createElement('a');
            link.href = img.src;
            link.download = 'sirius_qr.png';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
