<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sirius Shortener</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --bg-color: #f5f7fa;
            --card-bg: #ffffff;
            --text-color: #333;
            --accent-bg: #eef2f7; /* 薄いグレーのアクセント */
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h1 { font-size: 1.5rem; margin-bottom: 1.5rem; color: var(--primary-color); }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 1rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        
        /* 💡 結果エリアのスタイルを刷新 */
        #result {
            margin-top: 1.5rem;
            padding: 1.5rem 1rem; /* パディングを広めに */
            background: var(--accent-bg);
            border-radius: 8px;
            display: none;
            border: 1px solid #ddd;
        }
        
        #result p { margin: 0 0 0.5rem 0; font-size: 0.9rem; color: #666; }
        
        /* 💡 URL表示をスタイリッシュに */
        #shortUrl {
            display: block;
            margin-bottom: 1rem;
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--primary-color);
            
            /* 【修正ポイント1】改行を抑制し、はみ出た分は「...」にする */
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        /* QRコード表示エリア */
        #qrcode-container {
            margin: 1rem 0;
            background: #fff;
            padding: 12px;
            display: inline-block;
            border-radius: 8px;
            border: 1px solid #ccc;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        #qrcode-img {
            display: block;
            width: 150px;
            height: 150px;
        }
        
        /* ボタンを2列に並べる */
        .action-btns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 1rem;
        }
        .copy-btn {
            background: #555;
            font-size: 0.9rem;
            padding: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>URL Shortener</h1>
        <input type="url" id="urlInput" placeholder="https://example.com" required>
        <button id="generateBtn" onclick="shortenURL()">短縮URLを生成</button>
        
        <div id="result">
            <p>生成されたURL:</p>
            <strong id="shortUrl"></strong>
            
            <div id="qrcode-container">
                <img id="qrcode-img" src="" alt="QRコード">
            </div>
            
            <div class="action-btns">
                <button class="copy-btn" onclick="copyURL()">URLをコピー</button>
                <button class="copy-btn" style="background:#666;" onclick="downloadQR()">QRを保存</button>
            </div>
        </div>
    </div>

    <script>
        const GAS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbxI7z0qCNyP_FmpZCdGl11TSF_Ln9uq1Tb48BgjTZhaA-AEHENj0DElJNi1ml2YxNZG/exec";
        const CUSTOM_DOMAIN = window.location.origin;

        async function shortenURL() {
            const urlInput = document.getElementById('urlInput').value;
            const btn = document.getElementById('generateBtn');
            if(!urlInput) return alert("URLを入力してください");

            btn.disabled = true;
            btn.innerText = "生成中...";

            try {
                const res = await fetch(GAS_WEBAPP_URL, {
                    method: "POST",
                    body: JSON.stringify({ url: urlInput })
                });
                const data = await res.json();

                if(data.success) {
                    const resultDiv = document.getElementById('result');
                    const shortUrl = `${CUSTOM_DOMAIN}/go.html?id=${data.id}`;
                    
                    // URLセット
                    const shortUrlEl = document.getElementById('shortUrl');
                    shortUrlEl.innerText = shortUrl;
                    // クリックしても移動できるようにtitleにフルURLを入れる
                    shortUrlEl.title = shortUrl;
                    
                    // QRコード生成 (goqr.me APIを使用)
                    const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(shortUrl)}`;
                    document.getElementById('qrcode-img').src = qrUrl;

                    resultDiv.style.display = 'block';
                }
            } catch (e) {
                alert("エラーが発生しました。");
            } finally {
                btn.disabled = false;
                btn.innerText = "短縮URLを生成";
            }
        }

        function copyURL() {
            const url = document.getElementById('shortUrl').innerText;
            navigator.clipboard.writeText(url).then(() => {
                alert("コピーしました！");
            });
        }

        function downloadQR() {
            const img = document.getElementById('qrcode-img');
            if(!img.src) return;
            const link = document.createElement('a');
            link.href = img.src;
            link.download = 'sirius_qr.png';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
